services:

  identityservice:
    build:
      context: ..
      dockerfile: docker/services/identity/Dockerfile
    ports:
      - "5001:8001"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  courseservice:
    build:
      context: ..
      dockerfile: docker/services/course/Dockerfile
    ports:
      - "5003:8003"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  categoryservice:
    build:
      context: ..
      dockerfile: docker/services/category/Dockerfile
    ports:
      - "5002:8002"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  contentservice:
    build:
      context: ..
      dockerfile: docker/services/content/Dockerfile
    ports:
      - "5004:8004"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  enrollmentservice:
    build:
      context: ..
      dockerfile: docker/services/enrollment/Dockerfile
    ports:
      - "5005:8005"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  progressservice:
    build:
      context: ..
      dockerfile: docker/services/progress/Dockerfile
    ports:
      - "5006:8006"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  assessmentservice:
    build:
      context: ..
      dockerfile: docker/services/assessment/Dockerfile
    ports:
      - "5007:8007"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  certificateservice:
    build:
      context: ..
      dockerfile: docker/services/certificate/Dockerfile
    ports:
      - "5008:8008"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  reviewservice:
    build:
      context: ..
      dockerfile: docker/services/review/Dockerfile
    ports:
      - "5009:8009"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  userservice:
    build:
      context: ..
      dockerfile: docker/services/user/Dockerfile
    ports:
      - "5011:8011"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  paymentservice:
    build:
      context: ..
      dockerfile: docker/services/payment/Dockerfile
    ports:
      - "5013:8013"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
      - Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
    depends_on:
      - rabbitmq

  searchservice:
    build:
      context: ..
      dockerfile: docker/services/search/Dockerfile
    ports:
      - "5014:8014"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey123}
    depends_on:
      - rabbitmq
      - meilisearch

  discussionservice:
    build:
      context: ..
      dockerfile: docker/services/discussion/Dockerfile
    ports:
      - "5015:8015"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq

  mediaservice:
    build:
      context: ..
      dockerfile: docker/services/media/Dockerfile
    ports:
      - "5012:8012"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER:-minioadmin}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MinIO__BucketName=${MINIO_BUCKET_NAME:-olms-media}
    depends_on:
      - rabbitmq
      - minio

  notificationservice:
    build:
      context: ..
      dockerfile: docker/services/notification/Dockerfile
    ports:
      - "5010:8010"
    environment:
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RabbitMQ__Host=rabbitmq
      - Smtp__Host=${SMTP_HOST:-mailhog}
      - Smtp__Port=${SMTP_PORT:-1025}
      - Smtp__SenderEmail=${SMTP_SENDER_EMAIL:-noreply@lms.com}
      - Smtp__SenderName=${SMTP_SENDER_NAME:-LMS Notifications}
    depends_on:
      - rabbitmq
      - mailhog

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey123}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  apigateway:
    build:
      context: ..
      dockerfile: docker/gateway/Dockerfile
    ports:
      - "5000:8000"
    environment:
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://identityservice:8001
      - ReverseProxy__Clusters__category-cluster__Destinations__destination1__Address=http://categoryservice:8002
      - ReverseProxy__Clusters__course-cluster__Destinations__destination1__Address=http://courseservice:8003
      - ReverseProxy__Clusters__content-cluster__Destinations__destination1__Address=http://contentservice:8004
      - ReverseProxy__Clusters__enrollment-cluster__Destinations__destination1__Address=http://enrollmentservice:8005
      - ReverseProxy__Clusters__progress-cluster__Destinations__destination1__Address=http://progressservice:8006
      - ReverseProxy__Clusters__assessment-cluster__Destinations__destination1__Address=http://assessmentservice:8007
      - ReverseProxy__Clusters__certificate-cluster__Destinations__destination1__Address=http://certificateservice:8008
      - ReverseProxy__Clusters__review-cluster__Destinations__destination1__Address=http://reviewservice:8009
      - ReverseProxy__Clusters__user-cluster__Destinations__destination1__Address=http://userservice:8011
      - ReverseProxy__Clusters__media-cluster__Destinations__destination1__Address=http://mediaservice:8012
      - ReverseProxy__Clusters__notification-cluster__Destinations__destination1__Address=http://notificationservice:8010
      - ReverseProxy__Clusters__payment-cluster__Destinations__destination1__Address=http://paymentservice:8013
      - ReverseProxy__Clusters__search-cluster__Destinations__destination1__Address=http://searchservice:8014
      - ReverseProxy__Clusters__discussion-cluster__Destinations__destination1__Address=http://discussionservice:8015
    depends_on:
      - identityservice
      - courseservice
      - categoryservice
      - contentservice
      - enrollmentservice
      - progressservice
      - assessmentservice
      - certificateservice
      - reviewservice
      - userservice
      - mediaservice
      - notificationservice
      - paymentservice
      - searchservice
      - discussionservice
      - meilisearch

volumes:
  minio_data:
  meili_data:
