<div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 hover:border-primary-100 hover:shadow-[0_20px_50px_rgba(59,130,246,0.12)] transition-all duration-500 group flex flex-col h-full relative">
  
  <!-- Best Seller Badge -->
  <div class="absolute top-5 left-5 z-10 px-3 py-1.5 rounded-full bg-slate-900/90 backdrop-blur-md text-[10px] font-black text-primary-400 uppercase tracking-widest shadow-lg shadow-black/20 animate-in fade-in zoom-in duration-700">
    Best Seller
  </div>

  <!-- Thumbnail Container -->
  <div class="relative aspect-[16/10] overflow-hidden">
    <img [src]="course.thumbnailUrl" [alt]="course.title" class="w-full h-full object-cover group-hover:scale-110 group-hover:rotate-1 transition-transform duration-700 ease-out">
    
    <!-- Category Overlay -->
    <div class="absolute top-5 right-5 px-3 py-1.5 rounded-xl bg-white/95 backdrop-blur-md text-[10px] font-black text-slate-900 shadow-xl shadow-black/5 uppercase tracking-widest">
      {{course.category}}
    </div>

    <!-- Play Button Overlay on Hover -->
    <div class="absolute inset-0 bg-primary-600/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
      <div class="w-14 h-14 rounded-full bg-white text-primary-600 flex items-center justify-center shadow-2xl scale-50 group-hover:scale-100 transition-transform duration-500 ease-out">
        <lucide-icon [name]="Clock" size="24" class="fill-primary-600/10"></lucide-icon>
      </div>
    </div>
  </div>

  <!-- Content Section -->
  <div class="p-8 flex flex-col flex-1">
    <!-- Rating & Review Count -->
    <div class="flex items-center gap-2 mb-4">
      <div class="flex items-center gap-1 bg-amber-50 px-2 py-1 rounded-lg border border-amber-100">
        <lucide-icon [name]="Star" class="text-amber-500 fill-amber-500" size="12"></lucide-icon>
        <span class="text-xs font-black text-amber-700">{{course.rating}}</span>
      </div>
      <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">({{course.reviewCount | number}} Reviews)</span>
    </div>

    <!-- Title -->
    <h3 class="font-black text-slate-900 mb-3 text-lg leading-tight line-clamp-2 group-hover:text-primary-600 transition-colors duration-300">
      <a [routerLink]="['/courses', course.id]">{{course.title}}</a>
    </h3>

    <!-- Instructor Info -->
    <div class="flex items-center gap-3 mb-6">
      <div class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 border border-slate-200/50 group-hover:border-primary-200 group-hover:bg-primary-50 transition-colors">
        <lucide-icon [name]="User" size="14" class="group-hover:text-primary-600"></lucide-icon>
      </div>
      <div class="flex flex-col">
        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">Instructor</span>
        <span class="text-xs font-bold text-slate-700 leading-none">{{course.instructorName}}</span>
      </div>
    </div>

    <!-- Stats & Footer -->
    <div class="mt-auto">
      <div class="flex items-center gap-5 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">
        <div class="flex items-center gap-1.5 group-hover:text-slate-600 transition-colors">
          <lucide-icon [name]="Clock" size="14" class="text-slate-300 group-hover:text-primary-500"></lucide-icon>
          {{course.duration}}
        </div>
        <div class="flex items-center gap-1.5 group-hover:text-slate-600 transition-colors">
          <lucide-icon [name]="BookOpen" size="14" class="text-slate-300 group-hover:text-primary-500"></lucide-icon>
          {{course.lessonCount}} Lessons
        </div>
      </div>

      <div class="flex items-center justify-between pt-6 border-t border-slate-100">
        <div class="flex flex-col">
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Price</span>
          <span class="text-2xl font-black text-slate-900 tracking-tighter">${{course.price}}</span>
        </div>
        <a [routerLink]="['/courses', course.id]" 
           class="px-5 py-2.5 rounded-2xl bg-slate-50 text-slate-900 text-xs font-black uppercase tracking-widest hover:bg-primary-600 hover:text-white hover:shadow-lg hover:shadow-primary-600/20 transition-all duration-300">
          Details
        </a>
      </div>
    </div>
  </div>
</div>
