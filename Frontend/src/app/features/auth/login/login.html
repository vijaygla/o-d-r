<div class="min-h-screen pt-32 pb-20 bg-slate-50 flex items-center justify-center px-6">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-8 md:p-10">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-bold mb-3">Welcome Back</h1>
        <p class="text-slate-500">Log in to continue your learning journey</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div *ngIf="errorMessage" class="p-4 rounded-xl bg-red-50 text-red-600 text-sm font-medium border border-red-100 animate-in fade-in duration-300">
          {{errorMessage}}
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
          <div class="relative">
            <input 
              type="email" 
              formControlName="email"
              placeholder="name@company.com"
              class="w-full pl-14 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all outline-none"
              [class.border-red-300]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            >
            <lucide-icon [name]="Mail" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" size="18"></lucide-icon>
          </div>
          <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="mt-2 text-xs text-red-500">Please enter a valid email address.</p>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-semibold text-slate-700">Password</label>
            <a routerLink="/auth/forgot-password" class="text-sm font-medium text-primary-600 hover:text-primary-700">Forgot password?</a>
          </div>
          <div class="relative">
            <input 
              type="password" 
              formControlName="password"
              placeholder="••••••••"
              class="w-full pl-14 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all outline-none"
              [class.border-red-300]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            >
            <lucide-icon [name]="Lock" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" size="18"></lucide-icon>
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading"
          class="btn-primary w-full py-3.5 flex items-center justify-center gap-2 group disabled:opacity-70 disabled:cursor-not-allowed"
        >
          <lucide-icon *ngIf="isLoading" [name]="Loader2" class="animate-spin" size="20"></lucide-icon>
          <span *ngIf="!isLoading">Log In</span>
          <lucide-icon *ngIf="!isLoading" [name]="ArrowRight" class="group-hover:translate-x-1 transition-transform" size="18"></lucide-icon>
        </button>

        <div class="relative py-4">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-100"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-2 text-slate-400">Or continue with</span>
          </div>
        </div>

        <div id="google-btn"></div>
      </form>

      <div class="mt-10 pt-8 border-t border-slate-100 text-center">
        <p class="text-slate-500">
          Don't have an account? 
          <a routerLink="/auth/register" class="font-bold text-slate-900 hover:text-primary-600 transition-colors">Sign up for free</a>
        </p>
      </div>
    </div>
  </div>
</div>
