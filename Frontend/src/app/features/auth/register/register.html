<div class="min-h-screen pt-32 pb-20 bg-slate-50 flex items-center justify-center px-6">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-8 md:p-10">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-bold mb-3">Create Account</h1>
        <p class="text-slate-500">Join thousands of learners today</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div *ngIf="errorMessage" class="p-4 rounded-xl bg-red-50 text-red-600 text-sm font-medium border border-red-100">
          {{errorMessage}}
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
          <div class="relative">
            <input 
              type="text" 
              formControlName="name"
              placeholder="Vijay Kumar"
              class="w-full pl-14 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all outline-none"
            >
            <lucide-icon [name]="User" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" size="18"></lucide-icon>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
          <div class="relative">
            <input 
              type="email" 
              formControlName="email"
              placeholder="name@company.com"
              class="w-full pl-14 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all outline-none"
            >
            <lucide-icon [name]="Mail" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" size="18"></lucide-icon>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
          <div class="relative">
            <input 
              type="password" 
              formControlName="password"
              placeholder="••••••••"
              class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all outline-none"
            >
            <lucide-icon [name]="Lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></lucide-icon>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">I want to join as</label>
          <div class="grid grid-cols-2 gap-4">
            <label class="relative flex items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all"
                   [class.border-primary-500]="registerForm.get('role')?.value === 'Student'"
                   [class.bg-primary-50]="registerForm.get('role')?.value === 'Student'"
                   [class.border-slate-100]="registerForm.get('role')?.value !== 'Student'">
              <input type="radio" formControlName="role" value="Student" class="sr-only">
              <span class="font-semibold" [class.text-primary-700]="registerForm.get('role')?.value === 'Student'">Student</span>
            </label>
            <label class="relative flex items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all"
                   [class.border-primary-500]="registerForm.get('role')?.value === 'Instructor'"
                   [class.bg-primary-50]="registerForm.get('role')?.value === 'Instructor'"
                   [class.border-slate-100]="registerForm.get('role')?.value !== 'Instructor'">
              <input type="radio" formControlName="role" value="Instructor" class="sr-only">
              <span class="font-semibold" [class.text-primary-700]="registerForm.get('role')?.value === 'Instructor'">Instructor</span>
            </label>
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="registerForm.invalid || isLoading"
          class="btn-primary w-full py-3.5 mt-2 flex items-center justify-center gap-2 group disabled:opacity-70 disabled:cursor-not-allowed"
        >
          <lucide-icon *ngIf="isLoading" [name]="Loader2" class="animate-spin" size="20"></lucide-icon>
          <span *ngIf="!isLoading">Create Account</span>
          <lucide-icon *ngIf="!isLoading" [name]="ArrowRight" class="group-hover:translate-x-1 transition-transform" size="18"></lucide-icon>
        </button>

        <div class="relative py-4">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-100"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-2 text-slate-400">Or join with</span>
          </div>
        </div>

        <div id="google-btn"></div>
      </form>

      <div class="mt-10 pt-8 border-t border-slate-100 text-center">
        <p class="text-slate-500">
          Already have an account? 
          <a routerLink="/auth/login" class="font-bold text-slate-900 hover:text-primary-600 transition-colors">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
