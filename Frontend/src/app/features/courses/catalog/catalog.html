<div class="min-h-screen pt-28 pb-20 bg-slate-50">
  <div class="container mx-auto px-6">
    <!-- Header -->
    <div class="mb-12">
      <h1 class="text-4xl font-bold text-slate-900 mb-4">Explore Courses</h1>
      <p class="text-slate-500 max-w-2xl">Discover your next favorite skill. Choose from thousands of courses taught by industry experts.</p>
    </div>

    <!-- Filters Bar -->
    <div class="flex flex-col lg:flex-row gap-4 mb-10 items-center justify-between">
      <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
        <button 
          *ngFor="let cat of categories"
          (click)="onCategoryChange(cat)"
          [class]="'px-5 py-2 rounded-full text-sm font-semibold transition-all ' + (selectedCategory === cat ? 'bg-primary-600 text-white shadow-lg shadow-primary-500/30' : 'bg-white text-slate-600 hover:bg-slate-100')"
        >
          {{cat}}
        </button>
      </div>

      <div class="flex items-center gap-4 w-full lg:w-auto">
        <div class="relative flex-1 lg:w-80">
          <input 
            type="text" 
            [(ngModel)]="searchQuery"
            (ngModelChange)="onSearchChange()"
            placeholder="Search by title, instructor..." 
            class="w-full pl-12 pr-12 py-3 rounded-2xl bg-white border border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all outline-none text-sm font-bold text-slate-900"
          >
          <lucide-icon [name]="Search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></lucide-icon>
          
          <!-- Real-time Search Loading Indicator -->
          <div *ngIf="isSearching" class="absolute right-4 top-1/2 -translate-y-1/2">
            <lucide-icon [name]="Loader2" class="animate-spin text-primary-500" size="16"></lucide-icon>
          </div>
        </div>
        
        <button class="flex items-center gap-2 px-5 py-3 rounded-2xl bg-white border border-slate-200 text-slate-600 font-semibold hover:bg-slate-50 transition-colors text-sm">
          <lucide-icon [name]="SlidersHorizontal" size="18"></lucide-icon>
          Filters
        </button>

        <div class="hidden lg:flex items-center gap-2 px-5 py-3 rounded-2xl bg-white border border-slate-200 text-slate-600 font-semibold hover:bg-slate-50 transition-colors text-sm cursor-pointer">
          Sort by: Popular
          <lucide-icon [name]="ChevronDown" size="16"></lucide-icon>
        </div>
      </div>
    </div>

    <!-- Results Count -->
    <div class="mb-8 text-sm text-slate-500 font-medium" *ngIf="filteredCourses$ | async as courses">
      Showing <span class="text-slate-900">{{courses.length}}</span> results
    </div>

    <!-- Grid -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" *ngIf="filteredCourses$ | async as courses; else loading">
      <div *ngFor="let course of courses" class="h-full animate-in fade-in slide-in-from-bottom-4 duration-500">
        <app-course-card [course]="course"></app-course-card>
      </div>
      
      <div *ngIf="courses.length === 0" class="col-span-full py-20 text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-100 text-slate-400 mb-6">
          <lucide-icon [name]="Search" size="32"></lucide-icon>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">No courses found</h3>
        <p class="text-slate-500">Try adjusting your filters or search query.</p>
      </div>
    </div>

    <ng-template #loading>
      <div class="py-20 flex flex-col items-center justify-center">
        <lucide-icon [name]="Loader2" class="animate-spin text-primary-600 mb-4" size="48"></lucide-icon>
        <p class="text-slate-500 font-medium text-lg">Loading courses...</p>
      </div>
    </ng-template>

    <!-- Pagination Mock -->
    <div class="mt-20 flex justify-center" *ngIf="(filteredCourses$ | async)?.length">
      <div class="flex items-center gap-2">
        <button class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-400 cursor-not-allowed">
          <lucide-icon [name]="ChevronLeft" size="18"></lucide-icon>
        </button>
        <button class="w-10 h-10 rounded-xl bg-primary-600 text-white font-bold shadow-lg shadow-primary-500/30">1</button>
        <button class="w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-600 font-bold hover:bg-slate-50">2</button>
        <button class="w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-600 font-bold hover:bg-slate-50">3</button>
        <button class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-50">
          <lucide-icon [name]="ChevronRight" size="18"></lucide-icon>
        </button>
      </div>
    </div>
  </div>
</div>
